<body>
<div id="editor">
<div id="editor-sidebar">
</div>
<div id="editor-content"><textarea id="editor-textarea"></textarea></div>
<ninja-keys placeholder="Quick panel" class="dark" openHotkey="cmd+m" noAutoLoadMdIcons="true" hideBreadcrumbs="true">
    <slot name="footer"></slot>
</ninja-keys>
</div>

<script>

    // var editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
    //     extraKeys: {"Ctrl-b": "autocomplete"},
    //     hintOptions: {hint: synonyms},
    //     mode: "markdown",
    //     lineNumbers: false,
    // });
    // HyperMD.switchToNormal(editor);
    var editor = HyperMD.fromTextArea(document.getElementById("editor-textarea"), {
        mode: "hypermd",
        lineNumbers: false,
        extraKeys: {
            "Ctrl-Space": "autocomplete",   // Use Ctrl+Space to
        },
        hintOptions: {
            hint: CompleteEmoji.createHintFunc()
        },
    });
    editor.setSize(null, "100%");
    editor.hmdResolveURL = function(w) {
    }
    editor.on("inputRead", function (cm, change) {
        if (change.text.length === 1 && change.text[0] === '[') editor.showHint()
    })
    editor.hmdReadLink = async function(path) {
        path = path.replace('[', '').replace(']', '');
        let parts = path.split('/');
        const content = await loadFile(parts[0], parts[1] + '.md');
        editor.getDoc().setValue(content);
        setTimeout(function () {
            editor.focus();
        }, 0);
    }

    function buildSidebar() {
        var root = new TreeNode("zettel"); // Create the root-node
        for (dir in zettel) {
            if (dir === '') {
                continue;
            }

            var dirNode = new TreeNode(dir, {expanded: false});
            for (let file in zettel[dir]) {
                let fileNode = new TreeNode(file, {expanded: false});
                fileNode.on('click', async function (n, node) {
                    const content = await loadFile(node.parent.toString(), node.toString());
                    editor.getDoc().setValue(content);
                    editor.currentFolder = node.parent.toString();
                    editor.currentFile = node.toString();
                    editor.focus();
                });
                dirNode.addChild(fileNode);
            }
            root.addChild(dirNode);
        }

        if (zettel['']) {
            // Adding root files after folders
            for (let file in zettel[""]) {
                let fileNode = new TreeNode(file, {expanded: false});
                fileNode.on('click', async function (n, node) {
                    const content = await loadFile("", node.toString());
                    editor.getDoc().setValue(content);
                    editor.currentFolder = "";
                    editor.currentFile = node.toString();
                    editor.focus();
                });
                root.addChild(fileNode)
            }
        }

        var tree = new TreeView(root, "#editor-sidebar", {
            show_root: false,
            leaf_icon: ' ',
            parent_icon: '<i class="fas fa-folder"></i>'
        });
    }

    buildSidebar()
</script>

<script>
    const hotkeys = [
        {
            id: "Home",
            title: "Open Home",
            hotkey: "cmd+h",
            mdIcon: "home",
            handler: () => {
                console.log("navigation to home");
            }
        },
        {
            id: "Open Projects",
            title: "Open Projects",
            hotkey: "cmd+p",
            mdIcon: "apps",
            handler: () => {
                console.log("navigation to projects");
            }
        },
        {
            id: "Theme",
            title: "Change theme...",
            mdIcon: "desktop_windows",
            children: [
                {
                    id: "Light Theme",
                    title: "Change theme to Light",
                    mdIcon: "light_mode",
                    handler: () => {
                        console.log("theme light");
                    }
                },
                {
                    id: "Dark Theme",
                    title: "Change theme to Dark",
                    mdIcon: "dark_mode",
                    keywords: "lol",
                    handler: () => {
                        console.log("theme dark");
                    }
                }
            ]
        }
    ];
    const ninja = document.querySelector("ninja-keys");
    ninja.data = hotkeys;


    let savedDirectoryHandle = null;

    async function openDirectory() {
        // Retrieve saved handle from IndexedDB if available
        if (!savedDirectoryHandle) {
            savedDirectoryHandle= await getSavedDirectoryHandle();
        }

        // If no saved handle, prompt the user to pick a directory
        if (!savedDirectoryHandle) {
            savedDirectoryHandle = await window.showDirectoryPicker();
            await saveDirectoryHandle(savedDirectoryHandle);  // Save handle to IndexedDB
        }

        zettel = {};  // Reset the zettel structure
        await loadDirectory(savedDirectoryHandle);
        buildSidebar();
    }

    // Recursively load directory and parse .md files
    async function loadDirectory(directoryHandle, path = "", depth = 1) {
        for await (const entry of directoryHandle.values()) {
            if (entry.kind === 'directory') {
                if (entry.name.startsWith('.') || entry.name === "img") continue;

                if (depth < 2) {
                    const folder = `${path}${entry.name}/`;
                    zettel[entry.name] = {};
                    await loadDirectory(entry, folder, depth + 1);
                }
            } else if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                const folder = path.split('/').filter(Boolean).join('/');
                if (!zettel[folder]) zettel[folder] = {};
                zettel[folder][entry.name] = { handle: entry };
            }
        }
    }

    async function loadFile(folder, filename) {
        const fileData = zettel[folder][filename];
        if (fileData && fileData.handle) {
            const file = await fileData.handle.getFile();
            const header = filename.replace('.md', '').replace(/^\w/, (c) => c.toUpperCase());
            let content = await file.text();
            content = `# ${header}\n${content}`;
            content = content.replace(/\[\[(.+?)\|.*?\]\]/g, '[[$1]]');
            return content;
        }
        throw new Error(`Cannot load ${filename}. No file handle found.`);
    }

    async function saveFile(folder, filename) {
        const fileData = zettel[folder][filename];
        if (fileData && fileData.handle) {
            let content = editor.getValue();
            const header = filename.replace('.md', '').replace(/^\w/, (c) => c.toUpperCase());
            content = content.trimStart();
            if (content.startsWith(`# ${header}`)) {
                content = content.slice(`# ${header}`.length).trimStart();
            }

            const writable = await fileData.handle.createWritable();
            await writable.write(content);
            await writable.close();
        } else {
            alert(`Cannot save ${filename}. No file handle found.`);
        }
    }

    // Read file content
    async function readFile(fileHandle) {
        const file = await fileHandle.getFile();
        return await file.text();
    }

    document.addEventListener("keydown", function (event) {
        const folder = editor.currentFolder;
        const filename = editor.currentFile;
        saveFile(folder, filename);
    });

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('zettelApp', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = () => {
                const db = request.result;
                if (!db.objectStoreNames.contains('handles')) {
                    db.createObjectStore('handles');
                }
            };
        });
    }

    // Save the directory handle to IndexedDB
    async function saveDirectoryHandle(directoryHandle) {
        const db = await initDB();
        const transaction = db.transaction('handles', 'readwrite');
        const store = transaction.objectStore('handles');
        await store.put(directoryHandle, 'savedDirectoryHandle');
    }

    // Retrieve the saved directory handle from IndexedDB
    async function getSavedDirectoryHandle() {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction('handles', 'readonly');
            const store = transaction.objectStore('handles');
            const request = store.get('savedDirectoryHandle');
            request.onsuccess = () => resolve(request.result); // Resolve with the result from IndexedDB
            request.onerror = () => reject(request.error);
        });
    }

    openDirectory();
</script>
</body>
</html>
