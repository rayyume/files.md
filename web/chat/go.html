<!DOCTYPE html>

<body>
<script>
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('chat', 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = () => {
                const db = request.result;
                if (!db.objectStoreNames.contains('handles')) {
                    db.createObjectStore('handles');
                }
            };
        });
    }

    async function openDir() {
        let dirHandle = await window.showDirectoryPicker();
        await saveDirectoryHandle(dirHandle);
    }

    async function getRootDirHandle() {
        const db = await initDB();
        return new Promise((resolve, reject) => {
            const transaction = db.transaction('handles', 'readonly');
            const store = transaction.objectStore('handles');
            const request = store.get('savedDirectoryHandle');
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveDirectoryHandle(directoryHandle) {
        const db = await initDB();
        const transaction = db.transaction('handles', 'readwrite');
        const store = transaction.objectStore('handles');
        await store.put(directoryHandle, 'savedDirectoryHandle');
    }

    async function read(path) {
        const root = await getRootDirHandle();
        if (root === undefined) {
            console.error("please open dir");
        }
        let fileHandle = await root.getFileHandle('file.md');
        let file = await fileHandle.getFile();

        return await file.text();
    }

    async function exists(path) {
        try {
            const root = await getRootDirHandle();
            if (root === undefined) {
                return false;
            }

            await root.getFileHandle(path);
            return true;
        } catch (error) {
            console.log(error);
            // TODO Naive implementation, add error
            return false;
        }
    }

    function receive(val) {
        console.log(val);
    }

</script>
<script type="module">

    go.run(wasmModule.instance);
    console.log(reply('file.md'));
</script>
