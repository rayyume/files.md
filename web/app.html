<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files.md Alpha</title>
    <link rel="canonical" href="https://app.files.md/">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="manifest" href="manifest.json">
    <link href="app.css" rel="stylesheet">
    <link href="lib/normalize.css" rel="stylesheet">
    <link href="lib/tree.css" rel="stylesheet" >
    <link href="lib/codemirror.css" rel="stylesheet" >
    <link href="lib/hypermd.css" rel="stylesheet" >
    <script src="lib/tree.js"></script>
    <script src="lib/codemirror.js"></script>
    <script src="lib/core.js"></script>
    <script src="lib/markdown.js"></script>
    <script src="lib/hypermd.js"></script>
    <script src="lib/click.js"></script>
    <script src="lib/hide-token.js"></script>
    <script src="lib/fold.js"></script>
    <script src="lib/fold-image.js"></script>
    <script src="lib/fold-link.js"></script>
    <script src="lib/complete-links.js"></script>
    <script src="lib/show-hint.js"></script>
    <script src="lib/codemirror-go.js"></script>
    <script src="lib/codemirror-php.js"></script>
    <script src="lib/codemirror-shell.js"></script>
    <script src="lib/similarity.js"></script>
    <script src="files.js"></script>
</head>
<body>
<div id="sidebar">
</div>
<div id="content">
    <textarea id="editor"></textarea>
</div>
<div id="search" style="display: none;">
    <form autocomplete="off">
        <input type="text" id="search-input" placeholder="Go to file..." oninput="search()">
    </form>
    <ul id="search-results"></ul>
</div>
<div id="welcome"><p>100% local, we don't process your files: <button onClick="openDir()" id="openDirectory">Open directory with *.md files</button></p></div>
<script src="app.js"></script>
<script>
    init(document.getElementById("editor"));
</script>
</body>
</html>
