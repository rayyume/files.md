<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files.md</title>
    <style>
        html {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            font-size: 62.5%
        }

        body {
            margin: 0;
            background-color: #FFFEF0;
            color: #100F0F;
            font-size: 1.4em;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'IBM Plex Sans', 'Segoe UI', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        :root {
            --font-normal: calc(1.5rem + 0.25vw);
            --wrap-wide: 1000px;
            --wrap-normal: 37em;
            --line-height: 1.5;
        }

        @media (max-width: 860px) {
            :root {
                --wrap-normal: 88vw;
                --wrap-wide: 100vw;
                --input-width: 100%
            }
        }

        heading, content {
            display: block;
            margin-left: auto;
            margin-right: auto;
            max-width: var(--wrap-wide);
            width: var(--wrap-normal);
        }

        h1 {
            font-weight: 500;
            font-size: calc(1.35em + 0.55vw);
            letter-spacing: -0.02em;
            line-height: 1.25;
            margin-top: 1.5em;
            margin-bottom: 0.25em
        }

        p {
            font-size: var(--font-normal);
            max-width: var(--wrap-normal);
            line-height: var(--line-height);
        }

        @media (max-width: 860px) {
            :root {
                --wrap-normal: 88vw;
            }
        }

    </style>
</head>
<body>
<main>
